<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sreekar Vemula</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav aria-label="Main navigation">
        <a href="../">Home</a>
        <a href="../projects/">Projects</a>
        <a class="current" href="./">Contact</a>
        <a href="../resume/">Resume</a>
        <a href="https://github.com/Sreevemula" target="_blank" rel="noreferrer">GitHub Profile</a>
    </nav>

    <main class="contact-page">
        <h1>Contact</h1>
        <p>
            Send me a message using the form below. Your email app will open
            with the subject and message filled in.
        </p>

        <form class="contact-form" action="mailto:svemula@ucsd.edu" method="POST" enctype="text/plain">
            <div class="form-row">
                <label for="contact-email">Email</label>
                <input id="contact-email" type="email" name="email" value="your-email@example.com">
            </div>

            <div class="form-row">
                <label for="contact-subject">Subject</label>
                <input id="contact-subject" name="subject" value="Hello from my website">
            </div>

            <div class="form-row">
                <label for="contact-body">Message</label>
                <textarea id="contact-body" name="body">Hi Sreekar, I wanted to reach out after seeing your website.</textarea>
            </div>

            <button>Send message</button>
        </form>
    </main>
</body>
</html>
